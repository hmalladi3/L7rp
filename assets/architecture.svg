<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2d3d"/>
    </marker>
    <marker id="arrow-ctrl" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8aa1b5"/>
    </marker>
    <style>
      .panel { fill: #f7f8fa; stroke: #1f2d3d; stroke-width: 1.2; }
      .panel-accent { fill: #eef3fa; stroke: #1f4f8a; stroke-width: 1.4; }
      .panel-side { fill: #fafbfc; stroke: #6b7d92; stroke-width: 1; stroke-dasharray: 0; }
      .title { font-size: 15px; font-weight: 600; fill: #1f2d3d; }
      .sub { font-size: 12px; fill: #4a5a6e; }
      .small { font-size: 11px; fill: #4a5a6e; }
      .arrow-data { stroke: #1f2d3d; stroke-width: 1.6; fill: none; }
      .arrow-ctrl { stroke: #8aa1b5; stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; }
      .label { font-size: 11px; fill: #4a5a6e; }
      .listener-stripe { fill: #1f4f8a; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="940" height="760" fill="#ffffff"/>

  <!-- Downstream client -->
  <g>
    <rect class="panel" x="370" y="20" width="200" height="46" rx="6"/>
    <text class="title" x="470" y="44" text-anchor="middle">Downstream client</text>
    <text class="sub" x="470" y="60" text-anchor="middle">HTTP/1.1 · HTTP/2 · WebSocket</text>
  </g>
  <line class="arrow-data" x1="470" y1="66" x2="470" y2="100" marker-end="url(#arrow)"/>

  <!-- Listener -->
  <g>
    <rect class="panel-accent" x="320" y="102" width="300" height="70" rx="6"/>
    <rect class="listener-stripe" x="320" y="102" width="4" height="70"/>
    <text class="title" x="470" y="124" text-anchor="middle">Listener</text>
    <text class="sub" x="470" y="142" text-anchor="middle">TLS termination · SNI cert routing</text>
    <text class="sub" x="470" y="158" text-anchor="middle">request-smuggling defenses · SO_REUSEPORT</text>
  </g>
  <line class="arrow-data" x1="470" y1="172" x2="470" y2="200" marker-end="url(#arrow)"/>

  <!-- Router -->
  <g>
    <rect class="panel-accent" x="340" y="202" width="260" height="60" rx="6"/>
    <rect class="listener-stripe" x="340" y="202" width="4" height="60"/>
    <text class="title" x="470" y="224" text-anchor="middle">Router</text>
    <text class="sub" x="470" y="244" text-anchor="middle">host trie · path trie · header predicates</text>
  </g>
  <line class="arrow-data" x1="470" y1="262" x2="470" y2="290" marker-end="url(#arrow)"/>

  <!-- Middleware chain -->
  <g>
    <rect class="panel-accent" x="180" y="292" width="580" height="100" rx="6"/>
    <rect class="listener-stripe" x="180" y="292" width="4" height="100"/>
    <text class="title" x="470" y="315" text-anchor="middle">Middleware chain (per route)</text>
    <!-- Stage pills -->
    <g font-size="11" text-anchor="middle" fill="#1f2d3d">
      <rect x="200" y="338" width="80" height="22" rx="4" fill="#ffffff" stroke="#1f4f8a"/>
      <text x="240" y="353">request-id</text>
      <rect x="288" y="338" width="80" height="22" rx="4" fill="#ffffff" stroke="#1f4f8a"/>
      <text x="328" y="353">access-log</text>
      <rect x="376" y="338" width="80" height="22" rx="4" fill="#ffffff" stroke="#1f4f8a"/>
      <text x="416" y="353">panic</text>
      <rect x="464" y="338" width="80" height="22" rx="4" fill="#ffffff" stroke="#1f4f8a"/>
      <text x="504" y="353">rate-limit</text>
      <rect x="552" y="338" width="80" height="22" rx="4" fill="#ffffff" stroke="#1f4f8a"/>
      <text x="592" y="353">retry/hedge</text>
      <rect x="640" y="338" width="60" height="22" rx="4" fill="#ffffff" stroke="#1f4f8a"/>
      <text x="670" y="353">headers</text>
    </g>
    <text class="sub" x="470" y="383" text-anchor="middle">→ upstream proxy</text>
  </g>
  <line class="arrow-data" x1="470" y1="392" x2="470" y2="420" marker-end="url(#arrow)"/>

  <!-- Selector -->
  <g>
    <rect class="panel-accent" x="300" y="422" width="340" height="80" rx="6"/>
    <rect class="listener-stripe" x="300" y="422" width="4" height="80"/>
    <text class="title" x="470" y="446" text-anchor="middle">Selector</text>
    <text class="sub" x="470" y="466" text-anchor="middle">round-robin · weighted RR · least-connections</text>
    <text class="sub" x="470" y="482" text-anchor="middle">P2C+EWMA · consistent-hash w/ bounded loads</text>
    <text class="small" x="470" y="498" text-anchor="middle">filters by breaker + health eligibility</text>
  </g>

  <!-- Three upstream pools -->
  <line class="arrow-data" x1="380" y1="502" x2="330" y2="570" marker-end="url(#arrow)"/>
  <line class="arrow-data" x1="470" y1="502" x2="470" y2="570" marker-end="url(#arrow)"/>
  <line class="arrow-data" x1="560" y1="502" x2="610" y2="570" marker-end="url(#arrow)"/>

  <g>
    <rect class="panel" x="270" y="572" width="120" height="50" rx="6"/>
    <text class="title" x="330" y="594" text-anchor="middle">upstream 1</text>
    <text class="small" x="330" y="610" text-anchor="middle">backend</text>
  </g>
  <g>
    <rect class="panel" x="410" y="572" width="120" height="50" rx="6"/>
    <text class="title" x="470" y="594" text-anchor="middle">upstream 2</text>
    <text class="small" x="470" y="610" text-anchor="middle">backend</text>
  </g>
  <g>
    <rect class="panel" x="550" y="572" width="120" height="50" rx="6"/>
    <text class="title" x="610" y="594" text-anchor="middle">upstream 3</text>
    <text class="small" x="610" y="610" text-anchor="middle">backend</text>
  </g>

  <!-- Circuit breaker (right side, links to selector) -->
  <g>
    <rect class="panel-side" x="700" y="430" width="210" height="64" rx="6"/>
    <text class="title" x="805" y="452" text-anchor="middle">Circuit breaker</text>
    <text class="sub" x="805" y="470" text-anchor="middle">per upstream · hysteresis</text>
    <text class="small" x="805" y="485" text-anchor="middle">closed → open → half-open</text>
  </g>
  <line class="arrow-ctrl" x1="700" y1="462" x2="640" y2="462" marker-end="url(#arrow-ctrl)"/>

  <!-- Health monitor (below upstreams) -->
  <g>
    <rect class="panel-side" x="220" y="650" width="500" height="84" rx="6"/>
    <text class="title" x="470" y="672" text-anchor="middle">Health monitor</text>
    <text class="sub" x="470" y="690" text-anchor="middle">active probes (jittered, per-pool goroutine)</text>
    <text class="sub" x="470" y="706" text-anchor="middle">passive EWMA scoring · one-way valve to restore</text>
    <text class="small" x="470" y="722" text-anchor="middle">→ Selector eligibility</text>
  </g>
  <line class="arrow-ctrl" x1="330" y1="650" x2="330" y2="622" marker-end="url(#arrow-ctrl)"/>
  <line class="arrow-ctrl" x1="470" y1="650" x2="470" y2="622" marker-end="url(#arrow-ctrl)"/>
  <line class="arrow-ctrl" x1="610" y1="650" x2="610" y2="622" marker-end="url(#arrow-ctrl)"/>
  <line class="arrow-ctrl" x1="370" y1="650" x2="370" y2="502" marker-end="url(#arrow-ctrl)"/>

  <!-- Config / SIGHUP (left side) -->
  <g>
    <rect class="panel-side" x="20" y="232" width="160" height="84" rx="6"/>
    <text class="title" x="100" y="254" text-anchor="middle">Config</text>
    <text class="sub" x="100" y="272" text-anchor="middle">atomic.Pointer&lt;Config&gt;</text>
    <text class="small" x="100" y="288" text-anchor="middle">SIGHUP → diff &amp; swap</text>
    <text class="small" x="100" y="302" text-anchor="middle">zero-lock on hot path</text>
  </g>
  <line class="arrow-ctrl" x1="180" y1="232" x2="340" y2="232" marker-end="url(#arrow-ctrl)"/>

  <!-- Observability (left side, lower) -->
  <g>
    <rect class="panel-side" x="20" y="430" width="160" height="84" rx="6"/>
    <text class="title" x="100" y="452" text-anchor="middle">Observability</text>
    <text class="sub" x="100" y="470" text-anchor="middle">Prometheus /metrics</text>
    <text class="sub" x="100" y="486" text-anchor="middle">OTLP traces (W3C)</text>
    <text class="small" x="100" y="502" text-anchor="middle">slog JSON access log</text>
  </g>
  <line class="arrow-ctrl" x1="180" y1="462" x2="300" y2="462" marker-end="url(#arrow-ctrl)"/>

  <!-- Legend -->
  <g transform="translate(720, 660)">
    <text class="small" x="0" y="0" font-weight="600" fill="#1f2d3d">Legend</text>
    <line x1="0" y1="14" x2="30" y2="14" class="arrow-data"/>
    <text class="small" x="36" y="18">request path</text>
    <line x1="0" y1="34" x2="30" y2="34" class="arrow-ctrl"/>
    <text class="small" x="36" y="38">control / signal</text>
  </g>
</svg>
