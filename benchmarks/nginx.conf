# Equivalent nginx configuration for side-by-side benchmarking.
#
# Run with:
#   nginx -p $(pwd) -c $(pwd)/nginx.conf

worker_processes  auto;
daemon off;
pid /tmp/l7rp-bench-nginx.pid;
error_log /tmp/l7rp-bench-nginx-error.log warn;

events {
    worker_connections 4096;
}

http {
    access_log off;
    sendfile on;
    keepalive_timeout 60s;

    upstream backend {
        server 127.0.0.1:9001;
        server 127.0.0.1:9002;
        server 127.0.0.1:9003;
        # nginx open-source has no passive ejection; configure max_fails /
        # fail_timeout for a coarse approximation. Adjust to match the
        # behavior you're comparing against.
        keepalive 256;
    }

    server {
        listen 127.0.0.1:8081;
        server_name localhost;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }
    }
}
